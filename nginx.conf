server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — every non-file path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the service worker, its registrar, the manifest, or the shell —
    # otherwise PWA updates won't reach installed clients.
    location = /sw.js          { add_header Cache-Control "no-cache"; }
    location = /registerSW.js  { add_header Cache-Control "no-cache"; }
    location = /manifest.webmanifest { add_header Cache-Control "no-cache"; }
    location = /index.html     { add_header Cache-Control "no-cache"; }

    # Long-cache fingerprinted build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API + WebSocket (Socket.io) to the backend on :8080.
    location /api {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
