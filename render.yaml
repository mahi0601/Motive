# Render Blueprint — Motive web app (Vite static build + PWA).
# Deploy: push this repo to GitHub → Render → New → Blueprint → pick this repo.
services:
  - type: web
    name: motive-web
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      # Build-time: Vite inlines this. Point at the API service URL.
      - key: VITE_API_BASE_URL
        sync: false # e.g. https://api.motive.com  (or the motive-api .onrender.com URL)
    routes:
      # SPA fallback — every non-file path serves index.html.
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      # Never cache the service worker / manifest, or PWA updates won't reach clients.
      - path: /sw.js
        name: Cache-Control
        value: no-cache
      - path: /registerSW.js
        name: Cache-Control
        value: no-cache
      - path: /manifest.webmanifest
        name: Cache-Control
        value: no-cache
